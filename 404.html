<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 — Swagat Adhikary</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>⚡</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100svh;
      display: flex; align-items: center; justify-content: center;
      background: #060913; color: #e6edf7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center; padding: 24px;
    }
    .code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: clamp(5rem, 20vw, 9rem); font-weight: 800; line-height: 1;
      background: linear-gradient(100deg, #22d3ee, #a78bfa);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h1 { font-size: 1.3rem; margin: 18px 0 8px; }
    p { color: #93a1b8; margin-bottom: 30px; }
    a {
      display: inline-block; padding: 13px 28px; border-radius: 10px;
      background: linear-gradient(100deg, #22d3ee, #a78bfa);
      color: #04141a; font-weight: 600; text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(34, 211, 238, 0.35); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.8rem; color: #93a1b8; margin-top: 40px; }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>This page drifted off the map.</h1>
    <p>The page you're looking for doesn't exist — or it moved when the site got its glow-up.</p>
    <a href="/">Take me home</a>
    <div class="mono">GET /whatever-that-was → not found</div>
  </main>
</body>
</html>
